name: Security Scan

on:
  # Weekly scan every Monday at 09:00 UTC
  schedule:
    - cron: "0 9 * * 1"
  # Allow running on-demand from Actions tab
  workflow_dispatch:

jobs:
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so TruffleHog can scan all commits, not just HEAD
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          # Only report verified leaks to reduce false positives
          extra_args: --only-verified

  backend-dependency-scan:
    name: Backend Dependency Vulnerabilities (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan backend dependencies
        run: pip-audit -r backend/requirements.txt --output json | tee pip-audit-report.json

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  frontend-dependency-scan:
    name: Frontend Dependency Vulnerabilities (npm audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Scan frontend dependencies
        run: cd frontend && npm audit --audit-level=moderate --json | tee npm-audit-report.json

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  sast:
    name: Static Analysis (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit SAST
        run: |
          bandit -r backend/app/ -ll \
            --format json \
            --output bandit-report.json \
            || true  # don't fail pipeline — report is uploaded for review

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json
          retention-days: 30
