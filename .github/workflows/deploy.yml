name: Deploy

on:
  push:
    branches: [main]
  # Allow manual re-deploy from the Actions tab
  workflow_dispatch:

# Ensure only one deploy runs at a time — prevents race conditions
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    environment: production
    # Only deploy backend after frontend succeeds — avoids serving a new
    # frontend against an old API during the rollout window
    needs: deploy-frontend

    steps:
      - name: Trigger Render deploy webhook
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json"

      - name: Wait for Render deploy to complete
        # Render webhooks are fire-and-forget; poll the health endpoint
        # until the new version is live (up to 5 minutes)
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_HEALTH_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy after ${i} attempts"
              exit 0
            fi
            echo "Attempt ${i}/30 — status ${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "Backend did not become healthy in time"
          exit 1
