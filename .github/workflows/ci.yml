name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, SAST & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint & format check (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: SAST — static security analysis (bandit)
        # -ll = only medium & high severity; -x = exclude test fixtures
        run: bandit -r app/ -ll -x app/tests --exit-zero

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/testdb"
        run: pytest tests/ -v --tb=short

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Type Check & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run type-check

      - name: Dependency audit
        # Fail on high/critical vulnerabilities only
        run: npm audit --audit-level=high

  # ── Docker build smoke test ──────────────────────────────────────────────────
  docker-build:
    name: Docker — Build smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Only on push to main — saves minutes on every PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t job-tracker-backend:ci

      - name: Build frontend image
        run: docker build ./frontend -t job-tracker-frontend:ci

      - name: Smoke test — backend health endpoint
        run: |
          docker run -d --name backend-test \
            -e DATABASE_URL="postgresql+asyncpg://x:x@localhost/x" \
            -e ENVIRONMENT="production" \
            -p 8000:8000 \
            job-tracker-backend:ci
          # Give the app a moment to start, then hit /health
          sleep 5
          curl --fail --retry 3 --retry-delay 2 http://localhost:8000/health
          docker stop backend-test
