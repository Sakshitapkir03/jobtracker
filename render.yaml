services:
  - type: web
    name: h1b-job-tracker-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && pip uninstall -y uvloop || true
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --loop asyncio
    envVars:
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: ALLOWED_ORIGINS
        value: "https://frontend-mu-seven-30.vercel.app"
      - key: FRONTEND_URL
        value: "https://frontend-mu-seven-30.vercel.app"
      - key: BACKEND_URL
        value: "https://jobtracker-1qs1.onrender.com"
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ENVIRONMENT
        value: production
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: WEB_CONCURRENCY
        value: "2"
