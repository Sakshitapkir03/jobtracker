services:
  - type: web
    name: h1b-job-tracker-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # fill in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.0"
